spring:
  datasource:
    url: jdbc:h2:mem:order_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  rabbitmq:
    host: localhost
    port: 5672
    listener:
      simple:
        auto-startup: false

product:
  service:
    url: http://localhost:8081

rabbitmq:
  exchange: order-exchange
  queue: order-notification-queue
  routing-key: order.created
